<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Barang Belum Tersedia - Koperasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Menambahkan Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .row-pending { 
            background-color: #fff1f2 !important; 
        }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border: 1px solid black; padding: 8px; text-align: left; }
            th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
        }
        
        .print-only { display: none; }
        
        #masterList option, #unitList option { font-weight: bold; }
        
        .header-btn {
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-custom::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-custom::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .scroll-custom::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-7xl mx-auto p-4 md:p-6 no-print">
        <!-- Header -->
        <header class="mb-6 flex flex-col lg:flex-row lg:items-center justify-between bg-white p-6 rounded-xl shadow-sm border border-gray-200 gap-4">
            <div class="flex items-center gap-4">
                <!-- Icon Header Baru Menggunakan Lucide (Package) -->
                <div class="bg-red-600 p-3 rounded-lg text-white shadow-lg shadow-red-200">
                    <i data-lucide="package" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Daftar Tunggu Barang Kosong</h1>
                    <p class="text-gray-500 text-sm font-medium">Unit dan KLN BNI Kcu.Bandung</p>
                </div>
            </div>
            
            <div class="flex flex-row items-center gap-2">
                <button onclick="exportData()" class="header-btn bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold px-4 rounded-lg shadow-sm transition-all flex gap-2">
                    <i data-lucide="download" class="w-3 h-3"></i> BACKUP
                </button>
                
                <label class="header-btn bg-amber-600 hover:bg-amber-700 text-white text-[10px] font-bold px-4 rounded-lg shadow-sm transition-all cursor-pointer flex gap-2">
                    <i data-lucide="upload" class="w-3 h-3"></i> RESTORE
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                </label>

                <div class="header-btn bg-red-600 px-4 rounded-lg shadow-lg shadow-red-100 flex items-center gap-3 min-w-[120px]">
                    <span id="countPending" class="text-xl font-bold text-white leading-none">0</span>
                    <span class="text-[8px] text-white font-bold uppercase tracking-widest leading-tight text-left">Barang<br>Pending</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <!-- Form Input Area -->
            <div class="xl:col-span-4">
                <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200 sticky top-6">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h2 class="text-lg font-semibold text-gray-700">Catat Permintaan</h2>
                        <button onclick="resetFullForm()" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-gray-500 font-bold uppercase">Reset</button>
                    </div>
                    
                    <div class="space-y-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tanggal Permintaan</label>
                            <input type="date" id="tglMaster" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none font-semibold text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Unit Kerja / KLN</label>
                            <input type="text" id="unitMaster" list="unitList" placeholder="Ketik Unit Kerja..." class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none font-medium text-sm">
                            <datalist id="unitList"></datalist>
                        </div>
                    </div>

                    <div class="space-y-3 bg-red-50 p-4 rounded-lg border border-dashed border-red-200">
                        <h3 class="text-xs font-bold text-red-700 uppercase">Detail Barang Kosong:</h3>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nama Barang</label>
                            <input type="text" id="tempNama" list="masterList" placeholder="Ketik atau pilih barang..." class="w-full p-2 text-sm border border-gray-300 rounded mb-2 outline-none focus:ring-1 focus:ring-red-400">
                            <datalist id="masterList"></datalist>

                            <div class="grid grid-cols-2 gap-2 mb-3">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">QTY</label>
                                    <input type="number" id="tempQty" placeholder="0" class="w-full p-2 text-sm border border-gray-300 rounded">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Satuan</label>
                                    <select id="tempSatuan" class="w-full p-2 text-sm border border-gray-300 rounded outline-none focus:ring-1 focus:ring-red-400 bg-white font-medium">
                                        <option value="Pcs">Pcs</option>
                                        <option value="Pack">Pack</option>
                                        <option value="Lusin">Lusin</option>
                                        <option value="Box">Box</option>
                                        <option value="Rim">Rim</option>
                                    </select>
                                </div>
                            </div>

                            <button onclick="addItemToStaging()" class="w-full bg-red-500 hover:bg-red-600 text-white text-xs font-bold py-2.5 rounded transition-all shadow-md">
                                + TAMBAH KE DAFTAR
                            </button>
                        </div>
                    </div>

                    <div id="stagingArea" class="mt-4 space-y-2 max-h-48 overflow-y-auto hidden scroll-custom"></div>

                    <button id="btnSaveFinal" onclick="saveFinal()" class="w-full mt-6 bg-slate-800 hover:bg-black text-white font-bold py-3 rounded shadow-lg transition-all hidden">
                        SIMPAN KE ARSIP
                    </button>
                </div>
            </div>

            <div class="xl:col-span-8 space-y-6">
                <!-- Navigasi Tab -->
                <div class="flex flex-wrap gap-2 border-b border-gray-200">
                    <button id="tabPending" onclick="switchTab('pending')" class="px-6 py-2 font-bold text-sm border-b-2 border-red-600 text-red-600 transition-all">PENDING</button>
                    <button id="tabDone" onclick="switchTab('done')" class="px-6 py-2 font-bold text-sm text-gray-400 hover:text-gray-600 transition-all">RIWAYAT SELESAI</button>
                    <button id="tabRekap" onclick="switchTab('rekap')" class="px-6 py-2 font-bold text-sm text-gray-400 hover:text-gray-600 transition-all">REKAP & MASTER</button>
                </div>

                <!-- Fitur Pencarian -->
                <div id="searchBarContainer" class="relative">
                    <input type="text" id="searchInput" oninput="renderData()" placeholder="Cari Unit Kerja atau Nama Barang..." class="w-full p-3 pl-10 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <span class="absolute left-3 top-3.5 text-gray-400">🔍</span>
                </div>

                <div id="mainView" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <!-- Container Cetak PDF -->
    <div id="printArea" class="print-only"></div>

    <!-- Modal Update -->
    <div id="modalUpdate" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100] p-4 no-print">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md">
            <div class="mb-4">
                <h3 class="text-lg font-bold">Konfirmasi Pengambilan</h3>
                <p id="modalBarangInfo" class="text-xs text-gray-500 font-medium"></p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Tanggal Diambil:</label>
                    <input type="date" id="tglUpdate" class="w-full p-2.5 border border-gray-300 rounded font-semibold focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                
                <div class="bg-green-50 p-4 rounded-lg border border-green-100">
                    <label class="block text-xs font-bold text-green-700 mb-1 uppercase tracking-wider">Jumlah Tersedia:</label>
                    <div class="flex items-center gap-3">
                        <input type="number" id="qtyUpdate" class="w-full p-2.5 border border-green-300 rounded font-bold text-lg focus:ring-2 focus:ring-green-500 outline-none">
                        <span id="modalSatuan" class="font-bold text-green-700 uppercase"></span>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 mt-6">
                <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 font-bold rounded text-gray-600 hover:bg-gray-200 transition-colors">Batal</button>
                <button onclick="confirmUpdate()" class="flex-1 py-3 bg-green-600 text-white font-bold rounded hover:bg-green-700 transition-colors shadow-lg">Konfirmasi</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none text-sm z-50 no-print"></div>

    <script>
        document.getElementById('tglMaster').valueAsDate = new Date();
        document.getElementById('tglUpdate').valueAsDate = new Date();

        let db = JSON.parse(localStorage.getItem('koperasi_v4')) || [];
        let masterBarang = JSON.parse(localStorage.getItem('koperasi_master')) || [];
        let masterUnit = JSON.parse(localStorage.getItem('koperasi_units')) || [];
        
        let stagingItems = [];
        let currentTab = 'pending';
        let activeEditId = null;

        const chartColors = [
            'bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-amber-500', 
            'bg-purple-500', 'bg-pink-500', 'bg-indigo-500', 'bg-teal-500',
            'bg-orange-500', 'bg-cyan-500'
        ];

        function updateMasterDatalist() {
            const bList = document.getElementById('masterList');
            bList.innerHTML = '';
            [...new Set(masterBarang)].sort().forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                bList.appendChild(opt);
            });

            const uList = document.getElementById('unitList');
            uList.innerHTML = '';
            [...new Set(masterUnit)].sort().forEach(unit => {
                const opt = document.createElement('option');
                opt.value = unit;
                uList.appendChild(opt);
            });
        }

        window.addItemToStaging = function() {
            const nama = document.getElementById('tempNama').value.trim();
            const qty = parseInt(document.getElementById('tempQty').value);
            const satuan = document.getElementById('tempSatuan').value;

            if(!nama || isNaN(qty)) {
                showToast("Lengkapi data!");
                return;
            }

            if(!masterBarang.includes(nama)) {
                masterBarang.push(nama);
                localStorage.setItem('koperasi_master', JSON.stringify(masterBarang));
                updateMasterDatalist();
            }

            stagingItems.push({ nama, qty, satuan, status: 'Belum Tersedia' });
            document.getElementById('tempNama').value = '';
            document.getElementById('tempQty').value = '';
            document.getElementById('tempNama').focus();
            updateStagingUI();
        }

        function updateStagingUI() {
            const container = document.getElementById('stagingArea');
            const btnSave = document.getElementById('btnSaveFinal');
            container.classList.toggle('hidden', stagingItems.length === 0);
            btnSave.classList.toggle('hidden', stagingItems.length === 0);
            container.innerHTML = '<p class="text-[10px] font-bold text-gray-400 uppercase">Siap Simpan:</p>';
            stagingItems.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-white p-2 rounded border border-red-100 text-xs shadow-sm";
                div.innerHTML = `<span class="font-semibold text-red-700 uppercase">${item.nama} (${item.qty} ${item.satuan})</span>
                                 <button onclick="removeItemFromStaging(${idx})" class="text-red-500 font-bold px-2 hover:bg-red-50 rounded">✕</button>`;
                container.appendChild(div);
            });
        }

        window.removeItemFromStaging = function(idx) {
            stagingItems.splice(idx, 1);
            updateStagingUI();
        }

        window.saveFinal = function() {
            const unit = document.getElementById('unitMaster').value.trim();
            const tgl = document.getElementById('tglMaster').value;
            if(!unit || !tgl) { showToast("Unit & Tanggal wajib!"); return; }
            
            if(!masterUnit.includes(unit)) {
                masterUnit.push(unit);
                localStorage.setItem('koperasi_units', JSON.stringify(masterUnit));
                updateMasterDatalist();
            }

            stagingItems.forEach(item => {
                db.unshift({ id: Date.now() + Math.random(), unit, tglInput: tgl, tglAmbil: null, ...item });
            });
            stagingItems = [];
            saveToDisk();
            updateStagingUI();
            renderData();
            showToast("Berhasil disimpan!");
        }

        function saveToDisk() {
            localStorage.setItem('koperasi_v4', JSON.stringify(db));
            updateStats();
        }

        function updateStats() {
            const pending = db.filter(i => i.status === 'Belum Tersedia').length;
            document.getElementById('countPending').innerText = pending;
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.getElementById('tabPending').className = tab === 'pending' ? 'px-6 py-2 font-bold text-sm border-b-2 border-red-600 text-red-600 transition-all' : 'px-6 py-2 font-bold text-sm text-gray-400 hover:text-gray-600 transition-all';
            document.getElementById('tabDone').className = tab === 'done' ? 'px-6 py-2 font-bold text-sm border-b-2 border-green-600 text-green-600 transition-all' : 'px-6 py-2 font-bold text-sm text-gray-400 hover:text-gray-600 transition-all';
            document.getElementById('tabRekap').className = tab === 'rekap' ? 'px-6 py-2 font-bold text-sm border-b-2 border-purple-600 text-purple-600 transition-all' : 'px-6 py-2 font-bold text-sm text-gray-400 hover:text-gray-600 transition-all';
            document.getElementById('searchBarContainer').classList.toggle('hidden', tab === 'rekap');
            renderData();
        }

        window.openModalUpdate = function(id) {
            const item = db.find(i => i.id === id);
            if(!item) return;
            activeEditId = id;
            document.getElementById('modalBarangInfo').innerText = `${item.nama} - Permintaan: ${item.qty} ${item.satuan}`;
            document.getElementById('qtyUpdate').value = item.qty;
            document.getElementById('modalSatuan').innerText = item.satuan;
            document.getElementById('modalUpdate').classList.remove('hidden');
        }

        window.closeModal = function() {
            document.getElementById('modalUpdate').classList.add('hidden');
            activeEditId = null;
        }

        window.confirmUpdate = function() {
            const tglAmbil = document.getElementById('tglUpdate').value;
            const qtyTersedia = parseInt(document.getElementById('qtyUpdate').value);
            const itemIndex = db.findIndex(i => i.id === activeEditId);
            if (itemIndex === -1) return;
            const item = db[itemIndex];

            if(!tglAmbil || isNaN(qtyTersedia) || qtyTersedia <= 0 || qtyTersedia > item.qty) { 
                showToast("Data tidak valid!"); 
                return; 
            }

            if(qtyTersedia < item.qty) {
                const sisaQty = item.qty - qtyTersedia;
                db.push({ ...item, id: Date.now() + Math.random(), qty: sisaQty, status: 'Belum Tersedia' });
                item.qty = qtyTersedia;
            }

            item.status = 'Tersedia';
            item.tglAmbil = tglAmbil;
            saveToDisk(); closeModal(); renderData();
            showToast("Update Berhasil.");
        }

        function renderData() {
            const container = document.getElementById('mainView');
            const search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';

            if (currentTab === 'rekap') {
                renderRekap(container);
                return;
            }

            let filtered = db.filter(i => {
                const matchesTab = currentTab === 'pending' ? i.status === 'Belum Tersedia' : i.status === 'Tersedia';
                const matchesSearch = i.nama.toLowerCase().includes(search) || i.unit.toLowerCase().includes(search);
                return matchesTab && matchesSearch;
            });

            const groupedByDate = filtered.reduce((acc, obj) => {
                const key = currentTab === 'pending' ? obj.tglInput : obj.tglAmbil;
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});

            const sortedDates = Object.keys(groupedByDate).sort((a, b) => new Date(b) - new Date(a));
            if(sortedDates.length === 0) {
                container.innerHTML = `<div class="text-center p-12 bg-white rounded-xl border border-dashed border-gray-300"><p class="text-gray-400 font-medium">Kosong.</p></div>`;
                return;
            }

            sortedDates.forEach(date => {
                const formattedDate = new Date(date).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const dateBox = document.createElement('div');
                dateBox.className = "mb-8";
                dateBox.innerHTML = `<h3 class="text-sm font-bold text-gray-800 bg-gray-200 px-4 py-2 rounded-t-lg border-b border-gray-300 uppercase tracking-wide">📅 ${currentTab === 'pending' ? 'Tgl Minta' : 'Tgl Ambil'}: ${formattedDate}</h3>`;
                
                const units = groupedByDate[date].reduce((acc, obj) => {
                    if (!acc[obj.unit]) acc[obj.unit] = [];
                    acc[obj.unit].push(obj);
                    return acc;
                }, {});

                const tableWrapper = document.createElement('div');
                tableWrapper.className = "bg-white rounded-b-xl shadow-sm border border-gray-200 overflow-hidden";

                Object.keys(units).sort().forEach(unit => {
                    const section = document.createElement('div');
                    section.className = "border-b border-gray-100 last:border-0";
                    section.innerHTML = `
                        <div class="bg-blue-50/50 px-4 py-2 border-b border-blue-100 flex justify-between items-center">
                            <span class="text-xs font-bold text-blue-800 uppercase tracking-widest">UNIT: ${unit}</span>
                            ${currentTab === 'done' ? `<button onclick="printUnitData('${date}', '${unit}')" class="bg-slate-800 text-white text-[10px] px-3 py-1 rounded font-bold hover:bg-black transition-all">CETAK PDF</button>` : ''}
                        </div>
                        <table class="w-full text-left text-sm text-gray-700">
                            <tbody class="divide-y divide-gray-50">
                                ${units[unit].map(item => `
                                    <tr class="${currentTab === 'pending' ? 'row-pending' : ''}">
                                        <td class="p-3 pl-6 uppercase font-medium">${item.nama}</td>
                                        <td class="p-3 text-center w-32 font-bold">${item.qty} <span class="text-[10px] text-gray-400 uppercase">${item.satuan}</span></td>
                                        <td class="p-3 text-right w-32 pr-4">
                                            ${currentTab === 'pending' ? `<button onclick="openModalUpdate(${item.id})" class="bg-green-600 text-white text-[10px] font-bold px-3 py-1.5 rounded hover:bg-green-700 shadow-md">SELESAI</button>` : `<button onclick="deleteItem(${item.id})" class="text-gray-300 hover:text-red-500 transition-colors">Hapus</button>`}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>`;
                    tableWrapper.appendChild(section);
                });
                dateBox.appendChild(tableWrapper);
                container.appendChild(dateBox);
            });
        }

        function renderRekap(container) {
            const statsBarang = db.reduce((acc, obj) => {
                acc[obj.nama] = (acc[obj.nama] || 0) + 1;
                return acc;
            }, {});
            const sortedStats = Object.entries(statsBarang).sort((a, b) => b[1] - a[1]);

            const statsUnit = db.reduce((acc, obj) => {
                acc[obj.unit] = (acc[obj.unit] || 0) + 1;
                return acc;
            }, {});

            let html = `
                <div class="space-y-6">
                    <!-- Grafik Berwarna -->
                    <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
                        <h2 class="text-lg font-bold text-purple-700 mb-6 flex items-center gap-2">📊 Statistik Barang Sering Kosong</h2>
                        <div class="space-y-4">
                            ${sortedStats.length === 0 ? '<p class="text-center text-gray-400 italic">Belum ada data statistik.</p>' : 
                            sortedStats.slice(0, 10).map(([nama, jumlah], index) => {
                                const barWidth = (jumlah / sortedStats[0][1]) * 100;
                                const colorClass = chartColors[index % chartColors.length];
                                return `
                                <div>
                                    <div class="flex justify-between items-end mb-1">
                                        <span class="text-xs font-bold uppercase text-gray-600">${nama}</span>
                                        <span class="text-[10px] font-bold text-gray-400">${jumlah}x Terjadi</span>
                                    </div>
                                    <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden shadow-inner">
                                        <div class="${colorClass} h-full rounded-full transition-all duration-700" style="width: ${barWidth}%"></div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
                            <h3 class="text-sm font-bold text-gray-700 mb-4 flex justify-between items-center border-b pb-2">
                                📦 MASTER NAMA BARANG
                                <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-400">${masterBarang.length} Item Tersimpan</span>
                            </h3>
                            <div class="max-h-60 overflow-y-auto scroll-custom space-y-1">
                                ${masterBarang.length === 0 ? '<p class="text-[10px] text-gray-400 italic text-center py-4">Data masih kosong.</p>' : 
                                [...new Set(masterBarang)].sort().map(item => `
                                    <div class="flex items-center justify-between p-2 hover:bg-gray-50 rounded text-xs border border-transparent hover:border-gray-200 group">
                                        <div class="flex flex-col">
                                            <span class="uppercase font-bold text-gray-800">${item}</span>
                                            <span class="text-[9px] text-gray-400 uppercase">Total Entri: ${statsBarang[item] || 0}</span>
                                        </div>
                                        <button onclick="removeMasterItem('barang', '${item}')" class="text-gray-300 group-hover:text-red-500 px-2">✕</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
                            <h3 class="text-sm font-bold text-gray-700 mb-4 flex justify-between items-center border-b pb-2">
                                🏢 MASTER UNIT KERJA
                                <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-400">${masterUnit.length} Unit Tersimpan</span>
                            </h3>
                            <div class="max-h-60 overflow-y-auto scroll-custom space-y-1">
                                ${masterUnit.length === 0 ? '<p class="text-[10px] text-gray-400 italic text-center py-4">Data masih kosong.</p>' : 
                                [...new Set(masterUnit)].sort().map(unit => `
                                    <div class="flex items-center justify-between p-2 hover:bg-gray-50 rounded text-xs border border-transparent hover:border-gray-200 group">
                                        <div class="flex flex-col">
                                            <span class="uppercase font-bold text-gray-800">${unit}</span>
                                            <span class="text-[9px] text-gray-400 uppercase">Total Permintaan: ${statsUnit[unit] || 0}</span>
                                        </div>
                                        <button onclick="removeMasterItem('unit', '${unit}')" class="text-gray-300 group-hover:text-red-500 px-2">✕</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
            container.innerHTML = html;
            lucide.createIcons(); // Inisialisasi ulang icon pada tab rekap
        }

        window.removeMasterItem = function(type, value) {
            if(!confirm(`Hapus "${value}" dari daftar Master?`)) return;
            
            if(type === 'barang') {
                masterBarang = masterBarang.filter(v => v !== value);
                localStorage.setItem('koperasi_master', JSON.stringify(masterBarang));
            } else {
                masterUnit = masterUnit.filter(v => v !== value);
                localStorage.setItem('koperasi_units', JSON.stringify(masterUnit));
            }
            updateMasterDatalist();
            renderData();
            showToast("Master Data dihapus.");
        }

        window.printUnitData = function(date, unit) {
            const filtered = db.filter(i => i.tglAmbil === date && i.unit === unit && i.status === 'Tersedia');
            const printArea = document.getElementById('printArea');
            const formattedDate = new Date(date).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            let html = `
                <div style="text-align:center; margin-bottom: 20px; font-family: sans-serif;">
                    <h2 style="margin:0; text-transform:uppercase; font-size: 18px;">RIWAYAT PENGAMBILAN BARANG</h2>
                    <p style="margin:5px 0; font-size: 12px;">Unit Kerja: <strong>${unit}</strong> | Tanggal: <strong>${formattedDate}</strong></p>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th width="40" style="text-align:center;">NO</th>
                            <th>NAMA BARANG</th>
                            <th width="80" style="text-align:center;">QTY</th>
                            <th width="100" style="text-align:center;">SATUAN</th>
                            <th width="120" style="text-align:center;">PARAF</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map((item, idx) => `
                            <tr>
                                <td style="text-align:center;">${idx + 1}</td>
                                <td style="text-transform:uppercase;">${item.nama}</td>
                                <td style="text-align:center;">${item.qty}</td>
                                <td style="text-align:center; text-transform:uppercase;">${item.satuan}</td>
                                <td style="height:40px;"></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                <div style="margin-top: 30px; display: flex; justify-content: space-between; font-family: sans-serif; font-size: 12px;">
                    <div style="text-align:center; width: 200px;">
                        <p>Petugas Koperasi</p>
                        <br><br><br>
                        <p>( ........................ )</p>
                    </div>
                    <div style="text-align:center; width: 200px;">
                        <p>Penerima Barang</p>
                        <br><br><br>
                        <p>( ........................ )</p>
                    </div>
                </div>
            `;
            printArea.innerHTML = html;
            window.print();
        }

        window.deleteItem = function(id) {
            if(confirm("Hapus data dari arsip?")) { 
                db = db.filter(i => i.id !== id); 
                saveToDisk(); 
                renderData(); 
            }
        }

        window.resetFullForm = function() {
            document.getElementById('unitMaster').value = '';
            stagingItems = []; 
            updateStagingUI();
            showToast("Input dibersihkan.");
        }

        window.exportData = function() {
            const dataStr = JSON.stringify({ db, masterBarang, masterUnit });
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.href = dataUri;
            link.download = 'backup_koperasi_' + new Date().toISOString().slice(0,10) + '.json';
            link.click();
            showToast("Backup diunduh.");
        }

        window.importData = function(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imp = JSON.parse(e.target.result);
                    db = imp.db || [];
                    masterBarang = imp.masterBarang || [];
                    masterUnit = imp.masterUnit || [];
                    saveToDisk();
                    localStorage.setItem('koperasi_master', JSON.stringify(masterBarang));
                    localStorage.setItem('koperasi_units', JSON.stringify(masterUnit));
                    updateMasterDatalist();
                    renderData();
                    showToast("Restore Berhasil!");
                } catch(err) { showToast("File Error!"); }
            };
            reader.readAsText(event.target.files[0]);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; 
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        }

        // Inisialisasi Awal
        window.onload = function() {
            updateMasterDatalist();
            renderData();
            updateStats();
            lucide.createIcons(); // Inisialisasi icon saat halaman dimuat
        };

        // Pastikan icon dirender ulang setiap kali data berubah
        const originalRenderData = renderData;
        renderData = function() {
            originalRenderData();
            lucide.createIcons();
        };
    </script>
</body>
</html>
